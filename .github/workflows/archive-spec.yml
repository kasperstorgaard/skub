name: archive-spec

on:
  push:
    branches:
      - main
    paths:
      - spec.md

jobs:
  archive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2

      - name: Get branch name from merge commit
        id: branch
        run: |
          BRANCH=$(git log -1 --pretty=%s | grep -oP '(?<=\().*(?=\))' | head -1 || echo "")
          if [ -z "$BRANCH" ]; then
            BRANCH="unknown-$(git rev-parse --short HEAD)"
          fi
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Archive spec.md
        run: deno task archive-spec "${{ steps.branch.outputs.name }}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add specs/ spec.md
          git commit -m "Archive spec [skip ci]"
          git push
