name: archive-spec

on:
  push:
    branches:
      - main
    paths:
      - spec.md

jobs:
  archive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get branch slug from merge commit
        id: slug
        run: |
          # Extract the branch name from the merge commit message
          BRANCH=$(git log -1 --pretty=%s | grep -oP '(?<=\().*(?=\))' | head -1 || echo "")
          if [ -z "$BRANCH" ]; then
            # Fallback: use the commit SHA
            BRANCH="unknown-$(git rev-parse --short HEAD)"
          fi
          SLUG=$(echo "$BRANCH" | tr '/' '-' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | sed 's/--*/-/g' | sed 's/^-//;s/-$//')
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

      - name: Archive spec.md
        run: |
          mkdir -p specs
          mv spec.md "specs/${{ steps.slug.outputs.slug }}.md"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add specs/ spec.md
          git commit -m "Archive spec → specs/${{ steps.slug.outputs.slug }}.md [skip ci]"
          git push
