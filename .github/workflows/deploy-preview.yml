name: Register deploy preview

on:
  repository_dispatch:
    # Fired by Deno Deploy when a preview build is routed and ready
    types: [deno_deploy.build.routed]

permissions:
  deployments: write

jobs:
  register:
    runs-on: ubuntu-latest
    env:
      DEPLOY_SHA: ${{ github.event.client_payload.revision.git.sha }}
      DEPLOY_REF: ${{ github.event.client_payload.revision.git.ref }}
      PREVIEW_URL: ${{ github.event.client_payload.revision.preview_url }}

    steps:
      - name: Create deployment
        run: |
          MSG=$(gh api repos/${{ github.repository }}/commits/$DEPLOY_SHA \
            --jq '.commit.message | split("\n") | .[0]')

          DEPLOY_ID=$(gh api repos/${{ github.repository }}/deployments \
            --method POST \
            -f ref="$DEPLOY_REF" \
            -f environment=preview \
            -f auto_merge=false \
            -f required_contexts='[]' \
            -f description="$MSG" \
            --jq '.id')

          gh api repos/${{ github.repository }}/deployments/$DEPLOY_ID/statuses \
            --method POST \
            -f state=success \
            -f environment_url="$PREVIEW_URL"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
