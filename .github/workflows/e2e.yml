name: e2e tests
run-name: "e2e — ${{ github.event.deployment.description }}"

on:
  deployment_status:

concurrency:
  group: e2e-${{ github.event.deployment.ref }}
  cancel-in-progress: true

jobs:
  check-pr:
    if: github.event.deployment_status.state == 'success' && github.event.deployment.environment == 'preview'
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.pr.outputs.should-run }}
    steps:
      - name: Check for open, non-draft PR
        id: pr
        run: |
          PR_JSON=$(gh api repos/${{ github.repository }}/commits/${{ github.event.deployment.sha }}/pulls \
            --jq '.[0] // empty')
          if [ -z "$PR_JSON" ]; then
            echo "should-run=false" >> $GITHUB_OUTPUT
            echo "No open PR found"
            exit 0
          fi
          STATE=$(echo "$PR_JSON" | jq -r '.state')
          DRAFT=$(echo "$PR_JSON" | jq -r '.draft')
          if [ "$STATE" = "open" ] && [ "$DRAFT" = "false" ]; then
            echo "should-run=true" >> $GITHUB_OUTPUT
          else
            echo "should-run=false" >> $GITHUB_OUTPUT
            echo "Skipping: state=$STATE draft=$DRAFT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  e2e:
    needs: [check-pr]
    if: needs.check-pr.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    env:
      BASE_URL: ${{ github.event.deployment_status.environment_url }}
      DEPLOY_SHA: ${{ github.event.deployment.sha }}

    steps:
      - name: Post pending status
        run: |
          gh api repos/${{ github.repository }}/statuses/$DEPLOY_SHA \
            --method POST \
            -f state=pending \
            -f context="e2e tests" \
            -f description="Selecting and running tests..." \
            -f target_url="$BASE_URL"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.sha }}
          fetch-depth: 0

      - uses: denoland/setup-deno@v2
        with:
          # 2.7.12 fails, issue filed
          deno-version: 2.7.11

      - name: Fetch PR description
        id: pr
        run: |
          BODY=$(gh api repos/${{ github.repository }}/commits/$DEPLOY_SHA/pulls \
            --jq '.[0].body // ""')
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Select tests
        id: select
        continue-on-error: true
        run: |
          FILES=$(deno run -A scripts/select-e2e-tests.ts)
          echo "files=$FILES" >> $GITHUB_OUTPUT
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_DESCRIPTION: ${{ steps.pr.outputs.body }}

      - name: Generate puzzle manifest
        if: steps.select.outputs.files != ''
        run: deno run -A scripts/generate-manifest.ts

      - name: Install Playwright
        if: steps.select.outputs.files != ''
        run: npx playwright install chromium --with-deps

      - name: Run e2e tests
        if: steps.select.outputs.files != ''
        run: deno test -A --no-check $TEST_FILES
        env:
          E2E_SECRET: ${{ secrets.E2E_SECRET }}
          TEST_FILES: ${{ steps.select.outputs.files }}

      - name: Post final status
        if: always()
        run: |
          gh api repos/${{ github.repository }}/statuses/$DEPLOY_SHA \
            --method POST \
            -f state="$STATE" \
            -f context="e2e tests" \
            -f description="$DESC" \
            -f target_url="$RUN_URL"
        env:
          STATE: ${{ job.status == 'success' && 'success' || 'failure' }}
          DESC: ${{ job.status == 'success' && 'All tests passed' || 'Tests failed' }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
